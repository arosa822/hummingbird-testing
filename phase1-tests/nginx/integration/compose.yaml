# Integration test: Use Hummingbird nginx as a drop-in replacement for nginx
# Validates that the image works untouched as a production web server
#
# The nginx image is used as-is with configuration and static files
# volume-mounted, proving it can replace mainstream nginx images
# for hosting websites and APIs.

services:
  # Hummingbird nginx — used untouched as a drop-in replacement
  # Config and static files are volume-mounted, image is not modified
  web:
    image: quay.io/hummingbird/nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./style.css:/usr/share/nginx/html/style.css:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
    ports:
      - "8080:8080"
