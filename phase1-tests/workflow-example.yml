name: Phase 1 - Build Verification Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'phase1-tests/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'phase1-tests/**'
  workflow_dispatch:  # Allow manual trigger

jobs:
  test-curl:
    name: Test curl Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Run curl basic tests
        working-directory: phase1-tests/curl
        env:
          TEST_ENGINE: docker
        run: |
          chmod +x test.sh
          ./test.sh

      - name: Run curl integration tests
        working-directory: phase1-tests/curl/integration
        env:
          TEST_ENGINE: docker
        run: |
          chmod +x test-integration.sh
          ./test-integration.sh

  test-jq:
    name: Test jq Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Run jq basic tests
        working-directory: phase1-tests/jq
        env:
          TEST_ENGINE: docker
        run: |
          chmod +x test.sh
          ./test.sh

      - name: Run jq integration tests
        working-directory: phase1-tests/jq/integration
        env:
          TEST_ENGINE: docker
        run: |
          chmod +x test-integration.sh process-data.sh
          ./test-integration.sh

  test-nginx:
    name: Test nginx Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Run nginx basic tests
        working-directory: phase1-tests/nginx
        env:
          TEST_ENGINE: docker
        run: |
          chmod +x test.sh
          ./test.sh

      - name: Run nginx integration tests
        working-directory: phase1-tests/nginx/integration
        env:
          TEST_ENGINE: docker
        run: |
          chmod +x test-integration.sh
          ./test-integration.sh

  test-python:
    name: Test python-3-13 Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Run python-3-13 basic tests
        working-directory: phase1-tests/python-3-13
        env:
          TEST_ENGINE: docker
        run: |
          chmod +x test.sh
          ./test.sh

      - name: Run python-3-13 integration tests
        working-directory: phase1-tests/python-3-13/integration
        env:
          TEST_ENGINE: docker
        run: |
          chmod +x test-integration.sh
          ./test-integration.sh

  test-nodejs:
    name: Test nodejs-22 Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Run nodejs-22 basic tests
        working-directory: phase1-tests/nodejs-22
        env:
          TEST_ENGINE: docker
        run: |
          chmod +x test.sh
          ./test.sh

      - name: Run nodejs-22 integration tests
        working-directory: phase1-tests/nodejs-22/integration
        env:
          TEST_ENGINE: docker
        run: |
          chmod +x test-integration.sh
          ./test-integration.sh

  all-basic-tests:
    name: Run All Basic Tests
    runs-on: ubuntu-latest
    needs: [test-curl, test-jq, test-nginx, test-python, test-nodejs]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Run all basic tests
        working-directory: phase1-tests
        env:
          TEST_ENGINE: docker
        run: |
          chmod +x run-all-tests.sh
          ./run-all-tests.sh

      - name: Basic tests summary
        if: success()
        run: echo "✅ All basic tests passed!"

  all-integration-tests:
    name: Run All Integration Tests
    runs-on: ubuntu-latest
    needs: [test-curl, test-jq, test-nginx, test-python, test-nodejs]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Run all integration tests
        working-directory: phase1-tests
        env:
          TEST_ENGINE: docker
        run: |
          chmod +x run-all-integration-tests.sh
          ./run-all-integration-tests.sh

      - name: Integration tests summary
        if: success()
        run: echo "✅ All integration tests passed!"

  summary:
    name: Phase 1 Complete
    runs-on: ubuntu-latest
    needs: [all-basic-tests, all-integration-tests]
    steps:
      - name: Final summary
        run: |
          echo "=========================================="
          echo "Phase 1 Tests Complete!"
          echo "=========================================="
          echo ""
          echo "✅ All 5 images tested successfully"
          echo "✅ Basic tests (20 tests): PASSED"
          echo "✅ Integration tests (41 scenarios): PASSED"
          echo ""
          echo "Images validated:"
          echo "  - curl (HTTP/HTTPS utility)"
          echo "  - jq (JSON processor)"
          echo "  - nginx (Web server)"
          echo "  - python-3-13 (Python runtime)"
          echo "  - nodejs-22 (Node.js runtime)"
          echo ""
          echo "All Hummingbird images are production-ready!"
