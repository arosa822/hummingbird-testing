name: Phase 1 - Build Verification Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'phase1-tests/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'phase1-tests/**'
  workflow_dispatch:  # Allow manual trigger

jobs:
  test-curl:
    name: Test curl Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Run curl basic tests
        working-directory: phase1-tests/curl
        env:
          TEST_ENGINE: docker
        run: |
          chmod +x test.sh
          ./test.sh

  test-jq:
    name: Test jq Image
